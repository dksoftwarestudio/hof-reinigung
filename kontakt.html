<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt – hof-reinigung.de</title>

<style>
:root{
  --blue:#1A53AD;
  --bg:#F5F5F5;
  --text:#555555;
  --textDark:#2F2F2F;
  --muted:#666666;
  --card:#FFFFFF;
  --border:rgba(0,0,0,0.06);
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:30px 20px 60px;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:34px 28px;
  border:1px solid var(--border);
}

h1{
  margin:0 0 20px;
  font-size:28px;
  color:var(--textDark);
}

h2{
  margin:24px 0 10px;
  font-size:18px;
  color:var(--textDark);
}

p{
  margin:0 0 12px;
  line-height:1.6;
  color:var(--muted);
}

a{
  color:var(--blue);
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

.back{
  display:inline-block;
  margin-bottom:16px;
  font-size:14px;
  color:var(--blue);
  text-decoration:none;
}
</style>
</head>

<body>

<div class="wrap">

  <a class="back" href="index.html">← Zurück zur Startseite</a>

  <div class="card">

    <h1>Kontakt</h1>

    <p>
      Bei Fragen zu Reinigungsdiensten in Hof oder zu dieser Plattform
      können Sie uns direkt kontaktieren.
    </p>

    <h2>E-Mail</h2>
    <p>
      <a href="mailto:info@hof-reinigung.de">info@of-reinigung.de</a>
    </p>

    <h2>Betreiber</h2>
    <p>
      DK Software Studio<br>
      Dmytro Klevzov<br>
      Rabensteiner Straße 6<br>
      95032 Hof<br>
      Deutschland<br>
      01624012037
    </p>

  </div>

</div>

</body>
</html>
